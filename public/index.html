<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>רשימת קניות</title>

  <!-- ===== PWA: שלושת התגים החשובים ===== -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#3E7C4F" />
  <!-- אייפון: בלי זה, גם אחרי "הוסף למסך הבית" זה ייפתח בספארי -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="קניות" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #FAF7F0; --card: #FFFFFF; --ink: #2D2A26; --muted: #8A8378;
      --line: #EDE7DB; --green: #3E7C4F; --green-soft: #E4F0E7;
      --amber: #C97B2D; --danger: #B4452F;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Rubik', -apple-system, 'Segoe UI', 'Arial Hebrew', sans-serif;
      background: var(--bg); color: var(--ink);
      padding-bottom: 90px;
      -webkit-tap-highlight-color: transparent;
    }
    .header { padding: calc(22px + env(safe-area-inset-top)) 20px 14px; display: flex; align-items: baseline; justify-content: space-between; }
    h1 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
    h1 span { color: var(--green); }
    .sync { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-family: inherit; padding: 6px 0; }
    .sync .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .sync.busy .dot { animation: pulse 1s infinite; }
    .sync.offline .dot { background: var(--amber); }
    @keyframes pulse { 50% { opacity: 0.3; } }
    .who { display: flex; gap: 8px; padding: 0 20px 16px; }
    .who button { flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid var(--line); background: var(--card); font-family: inherit; font-size: 15px; cursor: pointer; color: var(--muted); }
    .who button.active { border-color: var(--green); background: var(--green-soft); color: var(--green); font-weight: 500; }
    .list { padding: 0 16px; }
    .section-label { font-size: 13px; color: var(--muted); margin: 18px 6px 8px; display: flex; justify-content: space-between; align-items: center; }
    .clear { background: none; border: none; color: var(--danger); font-family: inherit; font-size: 13px; cursor: pointer; padding: 4px; }
    .item { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
    .item:active { transform: scale(0.98); }
    .check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--line); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; }
    .item.done .check { background: var(--green); border-color: var(--green); }
    .item-name { flex: 1; font-size: 17px; }
    .item.done .item-name { text-decoration: line-through; color: var(--muted); }
    .item-by { font-size: 11px; color: var(--muted); background: var(--bg); border-radius: 8px; padding: 3px 8px; }
    .del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 6px; font-family: inherit; }
    .empty { text-align: center; color: var(--muted); padding: 60px 30px; font-size: 16px; line-height: 1.7; }
    .empty .big { font-size: 44px; display: block; margin-bottom: 12px; }
    .addbar { position: fixed; bottom: 0; right: 0; left: 0; background: var(--card); border-top: 1px solid var(--line); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); display: flex; gap: 8px; }
    .input { flex: 1; border: 1.5px solid var(--line); border-radius: 12px; padding: 12px 14px; font-size: 16px; font-family: inherit; background: var(--bg); color: var(--ink); outline: none; }
    .input:focus { border-color: var(--green); }
    .add { background: var(--green); color: white; border: none; border-radius: 12px; padding: 0 22px; font-size: 16px; font-weight: 500; font-family: inherit; cursor: pointer; }
    .add:disabled { opacity: 0.4; }
    .error { margin: 10px 16px; background: #FBEAE5; color: var(--danger); border-radius: 10px; padding: 10px 14px; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>רשימת <span>קניות</span></h1>
    <button class="sync" id="syncBtn"><span class="dot"></span><span id="syncText">מסונכרן · לחצו לרענון</span></button>
  </div>

  <div class="who" id="whoBar"></div>
  <div class="error hidden" id="errorBox"></div>
  <div class="list" id="listEl"></div>

  <div class="addbar">
    <input class="input" id="input" placeholder="מה צריך לקנות? (למשל: חלב 3%)" enterkeyhint="done" />
    <button class="add" id="addBtn" disabled>הוסף</button>
  </div>

  <script>
    // ===== מצב =====
    const NAMES = ["אלעד", "נויה"];
    const POLL_MS = 4000;
    let items = [];
    let who = localStorage.getItem("who") || null; // העדפה מקומית בלבד, לא הרשימה עצמה
    let busy = false;

    const $ = (id) => document.getElementById(id);

    // ===== API =====
    async function apiGet() {
      const res = await fetch("/api/list");
      if (!res.ok) throw new Error("get failed");
      return (await res.json()).items;
    }
    async function apiPut(newItems) {
      const res = await fetch("/api/list", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items: newItems })
      });
      if (!res.ok) throw new Error("put failed");
    }

    async function load() {
      setBusy(true);
      try {
        items = await apiGet();
        showError(null);
      } catch (e) {
        showError("אין חיבור לשרת — מציג את הגרסה האחרונה שנטענה");
      } finally {
        setBusy(false);
        render();
      }
    }

    async function save(newItems) {
      items = newItems;
      render();
      try {
        await apiPut(newItems);
        showError(null);
      } catch (e) {
        showError("השמירה נכשלה — בדקו חיבור ונסו שוב");
      }
    }

    // ===== פעולות =====
    function addItem() {
      const name = $("input").value.trim();
      if (!name) return;
      const it = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name, done: false, by: who || "", ts: Date.now() };
      $("input").value = "";
      $("addBtn").disabled = true;
      save([it, ...items]);
    }
    function toggle(id) { save(items.map(i => i.id === id ? { ...i, done: !i.done } : i)); }
    function removeItem(id) { save(items.filter(i => i.id !== id)); }
    function clearDone() { save(items.filter(i => !i.done)); }

    // ===== UI =====
    function setBusy(b) { busy = b; $("syncBtn").classList.toggle("busy", b); }
    function showError(msg) {
      $("errorBox").classList.toggle("hidden", !msg);
      if (msg) $("errorBox").textContent = msg;
    }

    function renderWho() {
      $("whoBar").innerHTML = "";
      NAMES.forEach(name => {
        const b = document.createElement("button");
        b.textContent = (who === name ? "✓ " : "") + name;
        b.className = who === name ? "active" : "";
        b.onclick = () => { who = who === name ? null : name; localStorage.setItem("who", who || ""); renderWho(); };
        $("whoBar").appendChild(b);
      });
    }

    function itemRow(item) {
      const row = document.createElement("div");
      row.className = "item" + (item.done ? " done" : "");
      row.onclick = () => toggle(item.id);

      const check = document.createElement("div");
      check.className = "check";
      check.textContent = item.done ? "✓" : "";

      const name = document.createElement("div");
      name.className = "item-name";
      name.textContent = item.name;

      row.append(check, name);

      if (item.by) {
        const by = document.createElement("div");
        by.className = "item-by";
        by.textContent = item.by;
        row.appendChild(by);
      }

      const del = document.createElement("button");
      del.className = "del";
      del.textContent = "✕";
      del.onclick = (e) => { e.stopPropagation(); removeItem(item.id); };
      row.appendChild(del);
      return row;
    }

    function render() {
      const el = $("listEl");
      el.innerHTML = "";
      const pending = items.filter(i => !i.done);
      const done = items.filter(i => i.done);

      if (!items.length) {
        el.innerHTML = '<div class="empty"><span class="big">🧺</span>הרשימה ריקה.<br>הוסיפו פריט ראשון למטה — והוא יופיע מיד גם בטלפון השני.</div>';
        return;
      }

      if (pending.length) {
        const lbl = document.createElement("div");
        lbl.className = "section-label";
        lbl.textContent = `לקנות (${pending.length})`;
        el.appendChild(lbl);
        pending.forEach(i => el.appendChild(itemRow(i)));
      }

      if (done.length) {
        const lbl = document.createElement("div");
        lbl.className = "section-label";
        lbl.innerHTML = `<span>בעגלה (${done.length})</span>`;
        const clr = document.createElement("button");
        clr.className = "clear";
        clr.textContent = "נקה פריטים שנקנו";
        clr.onclick = clearDone;
        lbl.appendChild(clr);
        el.appendChild(lbl);
        done.forEach(i => el.appendChild(itemRow(i)));
      }
    }

    // ===== אירועים =====
    $("input").addEventListener("input", () => { $("addBtn").disabled = !$("input").value.trim(); });
    $("input").addEventListener("keydown", (e) => { if (e.key === "Enter") addItem(); });
    $("addBtn").onclick = addItem;
    $("syncBtn").onclick = load;

    // רענון כשחוזרים לאפליקציה (חשוב ב-PWA — האפליקציה "קופאת" ברקע)
    document.addEventListener("visibilitychange", () => { if (!document.hidden) load(); });

    renderWho();
    load();
    setInterval(() => { if (!document.hidden) load(); }, POLL_MS);

    // ===== רישום ה-Service Worker =====
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
